<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 7 – Drag & Drop Sortable List</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<header>
  <div class="badge">Lab Task 7 — jQuery</div>
  <h1>Drag &amp; Drop Sortable List</h1>
  <p>Reorder items by dragging · Order updates dynamically in real time</p>
</header>

<div class="layout">
  <div>
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#6c63ff" stroke-width="2.5"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        Sortable Items
      </div>
      <ul id="sortable"></ul>
      <div class="info-strip">
        <div class="info-pill"><span class="dot-g"></span>Drag to reorder</div>
        <div class="info-pill"><span class="dot-p"></span>Hover for handle</div>
        <div class="info-pill"><span class="dot-pk"></span>Click ✕ to remove</div>
      </div>
    </div>

    <div class="card" style="margin-top:20px;">
      <div class="card-title">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#6c63ff" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
        Add New Item
      </div>
      <div class="add-form">
        <input type="text" id="new-item-input" placeholder="Enter item name…" maxlength="40"/>
        <button class="btn" id="add-btn">Add</button>
      </div>
    </div>
  </div>

  <div style="display:flex;flex-direction:column;gap:20px;">
    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#6c63ff" stroke-width="2.5"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        Current Order
      </div>
      <div id="current-order"></div>
      <button class="btn-reset" id="reset-btn">&#8635; Reset to Default</button>
    </div>

    <div class="card">
      <div class="card-title">
        <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#6c63ff" stroke-width="2.5"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        Activity Log
      </div>
      <ul id="order-log">
        <li class="log-entry"><span class="log-dot"></span>Waiting for drag events…</li>
      </ul>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
