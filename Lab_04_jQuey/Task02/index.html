<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 2 – Animated Image Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Page Header -->
  <header>
    <div class="badge"><span class="badge-dot"></span> Lab 04 · Task 02 · jQuery</div>
    <h1>Animated <em>Image</em> Gallery</h1>
    <p class="subtitle">Effects &amp; Animations · DOM Manipulation · Chaining</p>
  </header>

  <!-- Gallery Wrapper -->
  <div class="container">

    <!-- Slide Counter -->
    <div class="slide-meta">
      <span class="slide-counter">
        <span id="currentSlide">1</span>
        <span class="sep">/</span>
        <span id="totalSlides">6</span>
      </span>
      <div class="progress-dots" id="progressDots"></div>
      <span class="slide-label" id="slideLabel">Nature</span>
    </div>

    <!-- Gallery Card -->
    <div class="gallery-card">

      <!-- Image Stage -->
      <div class="image-stage">
        <div class="image-frame" id="imageFrame">
          <img id="galleryImg" src="" alt="Gallery Image"/>
          <!-- Overlay gradient -->
          <div class="img-overlay"></div>
        </div>

        <!-- Prev / Next arrows -->
        <button class="nav-btn prev-btn" id="prevBtn" aria-label="Previous">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <button class="nav-btn next-btn" id="nextBtn" aria-label="Next">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>

      <!-- Caption Area -->
      <div class="caption-area">
        <div class="caption-inner" id="captionInner">
          <h2 class="caption-title" id="captionTitle">Loading…</h2>
          <p class="caption-desc" id="captionDesc">Please wait.</p>
        </div>
        <div class="caption-tags" id="captionTags"></div>
      </div>

    </div>

    <!-- Thumbnail Strip -->
    <div class="thumb-strip" id="thumbStrip"></div>

    <!-- Autoplay Toggle -->
    <div class="controls-row">
      <button class="control-btn" id="autoplayBtn">
        <span id="autoplayIcon">▶</span>
        <span id="autoplayText">Autoplay</span>
      </button>
      <div class="autoplay-bar" id="autoplayBar">
        <div class="autoplay-fill" id="autoplayFill"></div>
      </div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
