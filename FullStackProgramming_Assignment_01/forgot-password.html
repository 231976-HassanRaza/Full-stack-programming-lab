<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password – AquaLux</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="navbar-brand">Aqua<span>Lux</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li><li><a href="category.html">Shop</a></li>
    </ul>
    <div class="nav-icons">
      <a href="cart.html" style="position:relative"><i class="bi bi-bag"></i><span class="cart-badge">3</span></a>
    </div>
    <button class="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="form-section">
  <div class="container">
    <div class="form-card">
      <div class="form-header">
        <div style="font-size:2.5rem;margin-bottom:10px"><i class="bi bi-key"></i></div>
        <h2>Forgot Password</h2>
        <p>Enter your email to receive a reset link</p>
      </div>
      <div class="form-body">

        <div id="successMsg" class="alert alert-success" style="display:none">
          <i class="bi bi-check-circle"></i> A password reset link has been sent to your email!
        </div>

        <form id="forgotForm" novalidate>
          <div class="form-group">
            <label for="forgotEmail"><i class="bi bi-envelope"></i> Email Address</label>
            <input type="email" id="forgotEmail" class="form-control validate-email" placeholder="you@example.com" />
            <span class="error-msg"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            <i class="bi bi-send"></i> Send Reset Link
          </button>
        </form>

        <div class="form-footer">
          <a href="login.html"><i class="bi bi-arrow-left"></i> Back to Login</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/main.js"></script>
<script>
$('#forgotForm').on('submit', function(e){
  e.preventDefault();
  const email = $('#forgotEmail');
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.val().trim())){
    email.addClass('error'); email.siblings('.error-msg').text('Enter a valid email.').addClass('show');
  } else {
    email.removeClass('error').addClass('success');
    email.siblings('.error-msg').removeClass('show');
    $('#successMsg').fadeIn();
    setTimeout(()=>{ window.location.href='login.html'; }, 3000);
  }
});
</script>
</body>
</html>
