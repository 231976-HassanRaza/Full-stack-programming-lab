<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – AquaLux</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="navbar-brand">Aqua<span>Lux</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="category.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-icons">
      <a href="my-account.html"><i class="bi bi-person"></i></a>
      <a href="cart.html" style="position:relative"><i class="bi bi-bag"></i><span class="cart-badge">3</span></a>
    </div>
    <button class="hamburger" aria-label="Menu"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="form-section">
  <div class="container">
    <div class="form-card">
      <div class="form-header">
        <div style="font-size:2.5rem;margin-bottom:10px"><i class="bi bi-person-circle"></i></div>
        <h2>Welcome Back</h2>
        <p>Sign in to your AquaLux account</p>
      </div>
      <div class="form-body">

        <div class="alert alert-info" id="loginAlert" style="display:none"></div>

        <form id="loginForm" novalidate>
          <div class="form-group">
            <label for="loginEmail"><i class="bi bi-envelope"></i> Email Address</label>
            <input type="email" id="loginEmail" class="form-control validate-email" placeholder="you@example.com" />
            <span class="error-msg"></span>
          </div>

          <div class="form-group">
            <label for="loginPassword"><i class="bi bi-lock"></i> Password</label>
            <div class="password-field">
              <input type="password" id="loginPassword" class="form-control" placeholder="Enter your password" />
              <button type="button" class="password-toggle"><i class="bi bi-eye"></i></button>
            </div>
            <span class="error-msg"></span>
            <div class="text-right mt-1"><a href="forgot-password.html" style="font-size:0.85rem;color:var(--secondary)">Forgot Password?</a></div>
          </div>

          <div class="form-group" style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="rememberMe" />
            <label for="rememberMe" style="margin:0;font-weight:normal;font-size:0.9rem">Remember me</label>
          </div>

          <button type="submit" class="btn btn-primary btn-block">
            <i class="bi bi-box-arrow-in-right"></i> Sign In
          </button>
        </form>

        <div class="divider"><span>or continue with</span></div>
        <div class="social-btns">
          <button class="btn-social"><i class="bi bi-google" style="color:#ea4335"></i> Google</button>
          <button class="btn-social"><i class="bi bi-facebook" style="color:#1877f2"></i> Facebook</button>
        </div>

        <div class="form-footer">
          Don't have an account? <a href="register.html">Create one</a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
