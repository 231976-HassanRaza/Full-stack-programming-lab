<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register – AquaLux</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="navbar-brand">Aqua<span>Lux</span></a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li><li><a href="category.html">Shop</a></li>
      <li><a href="about.html">About</a></li><li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-icons">
      <a href="my-account.html"><i class="bi bi-person"></i></a>
      <a href="cart.html" style="position:relative"><i class="bi bi-bag"></i><span class="cart-badge">3</span></a>
    </div>
    <button class="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>

<div class="form-section" style="padding:40px 0">
  <div class="container">
    <div class="form-card" style="max-width:560px">
      <div class="form-header">
        <div style="font-size:2.5rem;margin-bottom:10px"><i class="bi bi-person-plus"></i></div>
        <h2>Create Account</h2>
        <p>Join AquaLux and enjoy exclusive benefits</p>
      </div>
      <div class="form-body">
        <form id="registerForm" novalidate>

          <div class="form-row">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" id="regFirstName" class="form-control validate-name" placeholder="John" />
              <span class="error-msg"></span>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" id="regLastName" class="form-control validate-name" placeholder="Doe" />
              <span class="error-msg"></span>
            </div>
          </div>

          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="regEmail" class="form-control validate-email" placeholder="you@example.com" />
            <span class="error-msg"></span>
          </div>

          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" id="regPhone" class="form-control validate-phone" placeholder="+1 (555) 000-0000" />
            <span class="error-msg"></span>
          </div>

          <div class="form-group">
            <label>Password</label>
            <div class="password-field">
              <input type="password" id="regPassword" class="form-control validate-password" placeholder="Min 8 chars, 1 uppercase, 1 number" />
              <button type="button" class="password-toggle"><i class="bi bi-eye"></i></button>
            </div>
            <span class="error-msg"></span>
            <div style="margin-top:6px">
              <div id="strengthBar" style="height:4px;border-radius:2px;background:var(--border);transition:all 0.3s"></div>
              <small id="strengthText" style="color:var(--gray);font-size:0.78rem"></small>
            </div>
          </div>

          <div class="form-group">
            <label>Confirm Password</label>
            <div class="password-field">
              <input type="password" id="regConfirmPassword" class="form-control validate-confirm-password" placeholder="Re-enter password" />
              <button type="button" class="password-toggle"><i class="bi bi-eye"></i></button>
            </div>
            <span class="error-msg"></span>
          </div>

          <div class="form-group" style="display:flex;align-items:flex-start;gap:10px">
            <input type="checkbox" id="agreeTerms" style="margin-top:3px" />
            <label for="agreeTerms" style="margin:0;font-weight:normal;font-size:0.88rem;line-height:1.5">
              I agree to the <a href="terms.html" style="color:var(--secondary)">Terms & Conditions</a> and <a href="#" style="color:var(--secondary)">Privacy Policy</a>
            </label>
          </div>
          <span class="error-msg" id="termsError">You must agree to the terms.</span>

          <button type="submit" class="btn btn-primary btn-block">
            <i class="bi bi-person-check"></i> Create Account
          </button>
        </form>

        <div class="form-footer">Already have an account? <a href="login.html">Sign in</a></div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/main.js"></script>
<script>
// Password strength meter
$('#regPassword').on('input', function(){
  const pwd = $(this).val();
  let strength = 0;
  if(pwd.length >= 8) strength++;
  if(/[A-Z]/.test(pwd)) strength++;
  if(/[0-9]/.test(pwd)) strength++;
  if(/[^A-Za-z0-9]/.test(pwd)) strength++;
  const colors = ['','#dc3545','#ffc107','#2e86ab','#28a745'];
  const labels = ['','Weak','Fair','Good','Strong'];
  const widths = ['0%','25%','50%','75%','100%'];
  $('#strengthBar').css({background: colors[strength]||'var(--border)', width: widths[strength]||'0%'});
  $('#strengthText').text(strength > 0 ? labels[strength] : '').css('color', colors[strength]);
});
</script>
</body>
</html>
