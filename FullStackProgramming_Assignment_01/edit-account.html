<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Account – AquaLux</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<nav class="navbar">
  <div class="container">
    <a href="index.html" class="navbar-brand">Aqua<span>Lux</span></a>
    <ul class="nav-links"><li><a href="index.html">Home</a></li><li><a href="category.html">Shop</a></li></ul>
    <div class="nav-icons">
      <a href="my-account.html"><i class="bi bi-person"></i></a>
      <a href="cart.html" style="position:relative"><i class="bi bi-bag"></i><span class="cart-badge">3</span></a>
    </div>
    <button class="hamburger"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="page-header"><div class="container"><h1>Edit Account</h1></div></div>
<section class="section">
  <div class="container">
    <div class="row">
      <div class="col-3">
        <div class="account-sidebar">
          <div class="account-avatar"><i class="bi bi-person"></i></div>
          <h3>John Doe</h3><p>john.doe@email.com</p>
          <ul class="sidebar-nav">
            <li><a href="my-account.html"><i class="bi bi-person"></i> Dashboard</a></li>
            <li><a href="order-details.html"><i class="bi bi-bag"></i> My Orders</a></li>
            <li><a href="edit-account.html" class="active"><i class="bi bi-pencil"></i> Edit Account</a></li>
            <li><a href="edit-billing.html"><i class="bi bi-credit-card"></i> Billing Address</a></li>
            <li><a href="edit-shipping.html"><i class="bi bi-geo-alt"></i> Shipping Address</a></li>
            <li><a href="login.html"><i class="bi bi-box-arrow-right"></i> Logout</a></li>
          </ul>
        </div>
      </div>
      <div class="col-9">
        <div class="account-card">
          <h3>Account Details</h3>
          <form id="editAccountForm" novalidate>
            <div class="form-row">
              <div class="form-group"><label>First Name</label><input type="text" class="form-control validate-name" value="John" /><span class="error-msg"></span></div>
              <div class="form-group"><label>Last Name</label><input type="text" class="form-control validate-name" value="Doe" /><span class="error-msg"></span></div>
            </div>
            <div class="form-group"><label>Display Name</label><input type="text" class="form-control" value="John Doe" /></div>
            <div class="form-group"><label>Email Address</label><input type="email" class="form-control validate-email" value="john.doe@email.com" /><span class="error-msg"></span></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" class="form-control validate-phone" value="+1 (555) 123-4567" /><span class="error-msg"></span></div>
            <hr style="margin:20px 0;border-color:var(--border)"/>
            <h4 style="margin-bottom:16px;font-size:1rem">Change Password <small style="font-weight:normal;color:var(--gray)">(leave blank to keep current)</small></h4>
            <div class="form-group"><label>Current Password</label><div class="password-field"><input type="password" class="form-control" placeholder="Current password" /><button type="button" class="password-toggle"><i class="bi bi-eye"></i></button></div></div>
            <div class="form-group"><label>New Password</label><div class="password-field"><input type="password" class="form-control" placeholder="New password" /><button type="button" class="password-toggle"><i class="bi bi-eye"></i></button></div></div>
            <div class="form-group"><label>Confirm New Password</label><div class="password-field"><input type="password" class="form-control" placeholder="Confirm new password" /><button type="button" class="password-toggle"><i class="bi bi-eye"></i></button></div></div>
            <div style="display:flex;gap:12px"><button type="submit" class="btn btn-primary">Save Changes</button><a href="my-account.html" class="btn btn-outline" style="border-color:var(--border);color:var(--dark)">Cancel</a></div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
<footer class="footer"><div class="container"><div class="footer-bottom"><span>© 2025 AquaLux.</span></div></div></footer>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
